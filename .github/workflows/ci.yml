name: Advisory CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Advisory Typecheck, Tests, E2E, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        continue-on-error: true
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        continue-on-error: true
        run: pnpm check

      - name: Unit tests
        continue-on-error: true
        run: pnpm test

      - name: E2E tests
        continue-on-error: true
        run: pnpm test:e2e

      - name: Build
        continue-on-error: true
        run: pnpm build

      - name: Advisory summary
        if: always()
        run: |
          echo "Advisory CI completed. Check step logs for typecheck, test, E2E, and build signals."
          echo "This workflow is intentionally non-blocking while the project is still being shaped by multiple agents."
